# Video Quality Settings
vo=gpu
profile=high-quality
hwdec=auto-safe

# Complete Borderless Minimalism
border=no
osc=no
osd-level=1
osd-on-seek=no
osd-bar=no

# Playback
# Show last frame instead of black screen when episode ends
keep-open=yes
# Remember volume and other settings between launches (handled by AniCat for position)
save-position-on-quit=no

# Subtitles
sub-auto=fuzzy
sub-font="Outfit"
sub-font-size=44
sub-bold=yes
