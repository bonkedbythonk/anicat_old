# Video Quality Settings
vo=gpu
profile=high-quality
hwdec=videotoolbox-copy

# Complete Borderless Minimalism
border=no
osc=no

# Subtitles
sub-auto=fuzzy
sub-font="Outfit"
sub-font-size=44
sub-bold=yes

# Smooth 24fps playback on any refresh rate (120Hz, 144Hz, etc.)
# Without this, anime at 24fps stutters on high-refresh displays.
# video-sync=display-resample syncs each frame to the display, then
# interpolation blends frames so camera pans look fluid.
video-sync=display-resample
interpolation=yes
interpolation-threshold=0.01
tscale=oversample

# Reduce color banding in gradients (sky, shadows, dark scenes)
deband=yes
