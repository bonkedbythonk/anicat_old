# AniCat Upscaling Presets (Anime4K CNN)
# ctrl+1 -> Mode A (Balanced) — light CNN, great for 720p->1080p
# ctrl+2 -> Disable all upscaling
# ctrl+3 -> Mode C (HQ+Denoise) — heavier CNN with denoising
# ctrl+4 -> Mode A+A (Maximum) — dual-pass CNN, sharpest but heaviest
# ctrl+0 -> Disable (alternate)

# AniCat playback controls
# shift+n -> Next Episode
# shift+p -> Previous Episode
# shift+r -> Reload Episode
# shift+a -> Toggle Auto-play
# shift+t -> Toggle Dub / Sub
# ctrl+s -> Skip Intro / Active Skip Segment

# --- Upscaling presets ---
ctrl+1 no-osd change-list glsl-shaders set "~~/shaders/Anime4K_Clamp_Highlights.glsl:~~/shaders/Anime4K_Restore_CNN_L.glsl:~~/shaders/Anime4K_Upscale_CNN_x2_L.glsl:~~/shaders/Anime4K_AutoDownscalePre_x2.glsl:~~/shaders/Anime4K_AutoDownscalePre_x4.glsl"; show-text "Upscaling: Mode A (Balanced)"
ctrl+2 no-osd set glsl-shaders ""; show-text "Upscaling: OFF"
ctrl+3 no-osd change-list glsl-shaders set "~~/shaders/Anime4K_Clamp_Highlights.glsl:~~/shaders/Anime4K_Upscale_Denoise_CNN_x2_VL.glsl:~~/shaders/Anime4K_AutoDownscalePre_x2.glsl:~~/shaders/Anime4K_AutoDownscalePre_x4.glsl:~~/shaders/Anime4K_Upscale_CNN_x2_M.glsl"; show-text "Upscaling: Mode C (HQ+Denoise)"
ctrl+4 no-osd change-list glsl-shaders set "~~/shaders/Anime4K_Clamp_Highlights.glsl:~~/shaders/Anime4K_Restore_CNN_VL.glsl:~~/shaders/Anime4K_Upscale_CNN_x2_VL.glsl:~~/shaders/Anime4K_Restore_CNN_M.glsl:~~/shaders/Anime4K_AutoDownscalePre_x2.glsl:~~/shaders/Anime4K_AutoDownscalePre_x4.glsl:~~/shaders/Anime4K_Upscale_CNN_x2_M.glsl"; show-text "Upscaling: Mode A+A (Maximum)"
ctrl+0 no-osd set glsl-shaders ""; show-text "Upscaling: OFF"

# --- AniCat playback actions ---
shift+n script-message anicat-next-episode
shift+p script-message anicat-previous-episode
shift+r script-message anicat-reload-episode
shift+a script-message anicat-toggle-auto-next
shift+t script-message anicat-toggle-translation
ctrl+s script-message anicat-skip-intro
