# AniCat Curated Performance Shaders Keybindings
# ctrl+1 -> Enable Upscaling
# ctrl+2 -> Disable Upscaling

# AniCat playback controls
# shift+n -> Next Episode
# shift+p -> Previous Episode
# shift+r -> Reload Episode
# shift+a -> Toggle Auto-play
# shift+t -> Toggle Dub / Sub
# ctrl+s -> Skip Intro / Active Skip Segment

# --- Upscaling enable/disable (silent, no OSD popup) ---
ctrl+1 no-osd change-list glsl-shaders set "~~/shaders/Anime4K_Clamp_Highlights.glsl:~~/shaders/Anime4K_Deblur_DoG.glsl:~~/shaders/Anime4K_Upscale_DoG_x2.glsl:~~/shaders/Anime4K_AutoDownscalePre_x2.glsl:~~/shaders/Anime4K_AutoDownscalePre_x4.glsl"
ctrl+2 no-osd set glsl-shaders ""

# --- AniCat playback actions ---
shift+n script-message anicat-next-episode
shift+p script-message anicat-previous-episode
shift+r script-message anicat-reload-episode
shift+a script-message anicat-toggle-auto-next
shift+t script-message anicat-toggle-translation
ctrl+s script-message anicat-skip-intro
