# Samillion/ModernZ Config - AniCat Curated Theme
# This file configures the premium ModernZ OSC UI with glassmorphic accents, Outifit fonts, and deep charcoal styling.

# --- Core Settings ---
language=default
layout=default
icon_theme=fluent
icon_style=mixed
font=Outfit
idlescreen=no
window_top_bar=no
showwindowed=yes
showfullscreen=yes

# --- Elements Display ---
show_title=yes
title=${media-title}
title_font_size=20
chapter_title_font_size=14
show_chapter_title=yes
timecurrent=yes
time_format=dynamic
time_font_size=14
tooltip_font_size=13
speed_font_size=13

# --- Subtitles and Margins ---
sub_margins=yes
osd_margins=no
dynamic_margins=yes

# --- Playback Buttons & Controls ---
subtitles_button=yes
audio_tracks_button=yes
jump_buttons=yes
jump_amount=10
track_nextprev_buttons=yes
volume_control=yes
volume_control_type=linear
playlist_button=yes
fullscreen_button=yes
info_button=yes
ontop_button=yes
screenshot_button=no
download_button=no
loop_button=yes
shuffle_button=no
speed_button=yes

# --- Custom Action Overrides ---
# Map Next and Previous track buttons in the OSC to AniCat backend commands
playlist_next_mbtn_left_command=script-message anicat-next-episode
playlist_prev_mbtn_left_command=script-message anicat-previous-episode

# --- Aesthetic Styling and Colors ---
# Color format: #RRGGBB (Standard Hex)
# Match signature AniCat Cyan accents and charcoal glassmorphic styles
osc_color=#050505
title_color=#ffffff
window_title_color=#ffffff
window_controls_color=#ffffff
time_color=#ffffff
chapter_title_color=#e4e4e7
seekbarfg_color=#0A84FF
seekbarbg_color=#1c1c1e
seek_handle_color=#0A84FF
seek_handle_border_color=#ffffff
side_buttons_color=#ffffff
middle_buttons_color=#ffffff
playpause_color=#ffffff
hover_effect_color=#0A84FF

# --- Hover Interactions ---
hover_effect=size,glow,color
button_hover_size=112
button_held_size=100
button_glow_amount=3
slider_hover_size=100
tooltip_hints=yes

# --- Progress Bar Details ---
seek_handle_size=0.75
seekbar_height=medium
seekrange=yes
seekrangealpha=160
slider_rounded_corners=yes
nibbles_style=gap
nibbles_top=yes
nibbles_bottom=yes
persistent_progress=no
