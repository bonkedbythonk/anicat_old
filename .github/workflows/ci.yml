name: CI

on:
  pull_request:
  push:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system deps
        run: |
          sudo apt-get update && sudo apt-get install -y build-essential

      - name: Install Python tools
        run: |
          python -m pip install --upgrade pip
          pip install pytest ruff pyright

      - name: Install package
        run: |
          pip install -e .

      - name: Run tests
        run: |
          pytest -q

      - name: Run ruff
        run: |
          ruff check . || true

      - name: Run pyright
        run: |
          pyright || true

  web-check:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: web/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('web/package-lock.json') }}-${{ hashFiles('web/src/**/*.js', 'web/src/**/*.jsx', 'web/src/**/*.ts', 'web/src/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('web/package-lock.json') }}-

      - name: Install frontend deps
        working-directory: web
        run: |
          npm ci

      - name: Build frontend
        working-directory: web
        env:
          NEXT_TELEMETRY_DISABLED: 1
        run: |
          npm run build
