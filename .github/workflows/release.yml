name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-14' # Apple Silicon (M1) Runner
            args: '--target aarch64-apple-darwin'
            triple: 'aarch64-apple-darwin'
          # Add Windows/Linux here if needed later

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: web/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('web/package-lock.json') }}-${{ hashFiles('web/src/**/*.js', 'web/src/**/*.jsx', 'web/src/**/*.ts', 'web/src/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('web/package-lock.json') }}-

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: web/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('web/package-lock.json') }}-${{ hashFiles('web/src/**/*.js', 'web/src/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('web/package-lock.json') }}-

      - name: install python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: install python dependencies
        run: uv sync

      - name: build sidecar
        run: |
          uv run pyinstaller --noconfirm build_sidecar/sidecar.spec
          mkdir -p web/src-tauri/binaries
          mv dist/anicat-server web/src-tauri/binaries/anicat-server-${{ matrix.triple }}

      - name: install rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.triple }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install frontend dependencies
        run: cd web && npm install

      - name: build frontend
        working-directory: web
        env:
          NEXT_TELEMETRY_DISABLED: 1
        run: npm run build

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT_TELEMETRY_DISABLED: 1
          TAURI_BUNDLER_DMG_IGNORE_CI: "true"
        with:
          projectPath: web
          tagName: ${{ github.ref_name }}
          releaseName: 'Anicat ${{ github.ref_name }}'
          releaseBody: 'See the assets below to download the latest version of Anicat.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
