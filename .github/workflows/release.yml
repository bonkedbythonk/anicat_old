name: Release
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest]
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          version: "latest"
      - name: install dependencies
        run: |
          npm install
          uv sync --dev
      - name: build sidecar
        run: |
          uv run pyinstaller --version # Verify pyinstaller is there
          bash scripts/build_sidecar.sh
      - name: build tauri
        run: |
          cd web
          npm run build
          npx tauri build
      - name: upload release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            web/src-tauri/target/release/bundle/dmg/*.dmg
