name: Build Nightly

on:
  push:
    branches:
      - nightly
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-14' # Apple Silicon (M1) Runner
            args: '--target aarch64-apple-darwin'
            triple: 'aarch64-apple-darwin'
            sidecar_suffix: ''
            tauri_extra_env: 'TAURI_BUNDLER_DMG_IGNORE_CI: "true"'
          - platform: 'windows-latest'
            args: '--target x86_64-pc-windows-msvc'
            triple: 'x86_64-pc-windows-msvc'
            sidecar_suffix: '.exe'
            tauri_extra_env: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: web/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('web/package-lock.json') }}-${{ hashFiles('web/src/**/*.js', 'web/src/**/*.jsx', 'web/src/**/*.ts', 'web/src/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('web/package-lock.json') }}-

      - name: install python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: install uv
        if: runner.os == 'macOS'
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: install uv (Windows)
        if: runner.os == 'Windows'
        run: irm https://astral.sh/uv/install.ps1 | iex
        shell: powershell

      - name: install python dependencies
        run: uv sync

      - name: inject commit SHA into version
        run: |
          python -c "from pathlib import Path; p=Path('anicat_media/_version.py'); p.write_text(p.read_text().replace('__commit__ = \"\"', '__commit__ = \"${{ github.sha }}\"'))"
          echo "Injected commit SHA: ${{ github.sha }}"

      - name: build sidecar
        run: |
          uv run pyinstaller --noconfirm build_sidecar/sidecar.spec
          mkdir -p web/src-tauri/binaries
          mv dist/anicat-server${{ matrix.sidecar_suffix }} web/src-tauri/binaries/anicat-server-${{ matrix.triple }}${{ matrix.sidecar_suffix }}

      - name: install rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.triple }}

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            web/src-tauri -> target

      - name: install frontend dependencies
        run: cd web && npm install

      - name: Setup Bundled Player Companion (macOS)
        if: runner.os == 'macOS'
        run: chmod +x ./scripts/setup_bundled_player.sh && ./scripts/setup_bundled_player.sh

      - name: Setup Bundled Player Companion (Windows)
        if: runner.os == 'Windows'
        run: ./scripts/setup_bundled_player_windows.ps1
        shell: powershell

      - name: build frontend
        working-directory: web
        env:
          NEXT_TELEMETRY_DISABLED: 1
        run: npm run build

      - name: Set release parameters
        id: release_params
        run: |
          VERSION=$(cat version.txt)
          if [ "${{ github.ref_name }}" = "master" ]; then
            echo "tag=v${VERSION}-stable" >> $GITHUB_OUTPUT
            echo "name=Anicat v${VERSION}" >> $GITHUB_OUTPUT
            echo "body=Auto-built from master branch — Anicat v${VERSION}." >> $GITHUB_OUTPUT
            echo "draft=false" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
            # Also export as env vars for downstream shell steps
            echo "RELEASE_TAG=v${VERSION}-stable" >> $GITHUB_ENV
            echo "RELEASE_NAME=Anicat v${VERSION}" >> $GITHUB_ENV
            echo "RELEASE_BODY=Auto-built from master branch — Anicat v${VERSION}." >> $GITHUB_ENV
            echo "RELEASE_DRAFT=false" >> $GITHUB_ENV
            echo "RELEASE_PRERELEASE=false" >> $GITHUB_ENV
          else
            echo "tag=nightly" >> $GITHUB_OUTPUT
            echo "name=Anicat Nightly Build" >> $GITHUB_OUTPUT
            echo "body=Automated rolling pre-release built from nightly branch. Last updated: ${{ github.event.head_commit.timestamp || 'Manual Trigger' }} (commit ${{ github.sha }})." >> $GITHUB_OUTPUT
            echo "draft=false" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
            # Also export as env vars for downstream shell steps
            echo "RELEASE_TAG=nightly" >> $GITHUB_ENV
            echo "RELEASE_NAME=Anicat Nightly Build" >> $GITHUB_ENV
            echo "RELEASE_BODY=Automated rolling pre-release built from nightly branch. Last updated: ${{ github.event.head_commit.timestamp || 'Manual Trigger' }} (commit ${{ github.sha }})." >> $GITHUB_ENV
            echo "RELEASE_DRAFT=false" >> $GITHUB_ENV
            echo "RELEASE_PRERELEASE=true" >> $GITHUB_ENV
          fi

      - name: Pre-clean release tag (re-run safety)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "$RELEASE_TAG" --yes --cleanup-tag 2>/dev/null || true
          echo "Pre-cleaned tag: $RELEASE_TAG"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT_TELEMETRY_DISABLED: 1
          TAURI_BUNDLER_DMG_IGNORE_CI: "true"
        with:
          projectPath: web
          tagName: ${{ steps.release_params.outputs.tag }}
          releaseName: ${{ steps.release_params.outputs.name }}
          releaseBody: ${{ steps.release_params.outputs.body }}
          releaseDraft: ${{ steps.release_params.outputs.draft }}
          prerelease: ${{ steps.release_params.outputs.prerelease }}
          args: ${{ matrix.args }}

      - name: Clean up older rolling releases
        if: github.ref_name == 'master'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT_TAG="$RELEASE_TAG"
          # Only clean up if the current release was actually created
          if gh release view "$CURRENT_TAG" --json tagName --jq '.tagName' 2>/dev/null; then
            echo "Current release exists. Removing older stable releases (keeping $CURRENT_TAG)..."
            gh release list --limit 100 --json tagName --jq '.[].tagName' \
              | grep -- '-stable$' \
              | grep -v "$CURRENT_TAG" \
              | while read -r old_tag; do
                  echo "  Deleting: $old_tag"
                  gh release delete "$old_tag" --yes --cleanup-tag || true
                done
            echo "Older stable releases cleaned up."
          else
            echo "Current release $CURRENT_TAG was not created. Skipping cleanup to preserve existing releases."
          fi
