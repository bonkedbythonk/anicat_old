name: Build Nightly

on:
  push:
    branches:
      - nightly
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-14' # Apple Silicon (M1) Runner
            args: '--target aarch64-apple-darwin'
            triple: 'aarch64-apple-darwin'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: web/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('web/package-lock.json') }}-${{ hashFiles('web/src/**/*.js', 'web/src/**/*.jsx', 'web/src/**/*.ts', 'web/src/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('web/package-lock.json') }}-

      - name: install python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: install python dependencies
        run: uv sync

      - name: build sidecar
        run: |
          uv run pyinstaller --noconfirm build_sidecar/sidecar.spec
          mkdir -p web/src-tauri/binaries
          mv dist/anicat-server web/src-tauri/binaries/anicat-server-${{ matrix.triple }}

      - name: install rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.triple }}

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            web/src-tauri -> target

      - name: install frontend dependencies
        run: cd web && npm install

      - name: Setup Bundled Player Companion
        run: chmod +x ./scripts/setup_bundled_player.sh && ./scripts/setup_bundled_player.sh

      - name: build frontend
        working-directory: web
        env:
          NEXT_TELEMETRY_DISABLED: 1
        run: npm run build

      - name: Set release parameters
        run: |
          VERSION=$(cat version.txt)
          if [ "${{ github.ref_name }}" = "master" ]; then
            echo "RELEASE_TAG=v${VERSION}-stable" >> $GITHUB_ENV
            echo "RELEASE_NAME=Anicat v${VERSION} (Stable Rolling)" >> $GITHUB_ENV
            echo "RELEASE_BODY=Auto-built from master branch — Anicat v${VERSION}. This rolling stable build updates on every push to master." >> $GITHUB_ENV
            echo "RELEASE_DRAFT=true" >> $GITHUB_ENV
            echo "RELEASE_PRERELEASE=false" >> $GITHUB_ENV
          else
            echo "RELEASE_TAG=nightly" >> $GITHUB_ENV
            echo "RELEASE_NAME=Anicat Nightly Build" >> $GITHUB_ENV
            echo "RELEASE_BODY=Automated rolling pre-release built from nightly branch. Last updated: ${{ github.event.head_commit.timestamp || 'Manual Trigger' }} (commit ${{ github.sha }}). Install via: curl -fsSL https://raw.githubusercontent.com/bonkedbythonk/anicat/master/scripts/install_macos.sh | sed 's/releases/latest/releases/tags/nightly/g' | bash" >> $GITHUB_ENV
            echo "RELEASE_DRAFT=false" >> $GITHUB_ENV
            echo "RELEASE_PRERELEASE=true" >> $GITHUB_ENV
          fi

      - name: Delete old rolling release(s)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Always clean the tag we're about to create (re-run safety)
          gh release delete "${{ env.RELEASE_TAG }}" --yes --cleanup-tag || true

          if [ "${{ github.ref_name }}" = "master" ]; then
            echo "Deleting all existing stable rolling releases..."
            gh release list --limit 100 --json tagName --jq '.[].tagName' \
              | grep -- '-stable$' \
              | while read -r tag; do
                  echo "  Deleting: $tag"
                  gh release delete "$tag" --yes --cleanup-tag || true
                done
            echo "Stable releases cleaned up."
          else
            echo "Cleaning up existing nightly release: nightly"
            gh release delete nightly --yes --cleanup-tag || true
          fi

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT_TELEMETRY_DISABLED: 1
          TAURI_BUNDLER_DMG_IGNORE_CI: "true"
        with:
          projectPath: web
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: ${{ env.RELEASE_NAME }}
          releaseBody: ${{ env.RELEASE_BODY }}
          releaseDraft: ${{ env.RELEASE_DRAFT }}
          prerelease: ${{ env.RELEASE_PRERELEASE }}
          args: ${{ matrix.args }}
