name: Build Nightly

on:
  push:
    branches:
      - nightly
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.release_params.outputs.tag }}
      name: ${{ steps.release_params.outputs.name }}
      body: ${{ steps.release_params.outputs.body }}
      prerelease: ${{ steps.release_params.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4

      - name: Set release parameters
        id: release_params
        run: |
          VERSION=$(cat version.txt)
          if [ "${{ github.ref_name }}" = "master" ]; then
            echo "tag=v${VERSION}-stable" >> $GITHUB_OUTPUT
            echo "name=Anicat v${VERSION}" >> $GITHUB_OUTPUT
            echo "body=Auto-built from master branch — Anicat v${VERSION}." >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
          else
            echo "tag=nightly" >> $GITHUB_OUTPUT
            echo "name=Anicat Nightly Build" >> $GITHUB_OUTPUT
            {
              echo "body<<EOF"
              echo "Automated rolling pre-release built from nightly branch. Last updated: ${{ github.event.head_commit.timestamp || 'Manual Trigger' }} (commit ${{ github.sha }})."
              echo ""
              echo "### Installation"
              echo ""
              echo "**macOS App (Recommended):**"
              echo "\`\`\`bash"
              echo "curl -fsSL https://raw.githubusercontent.com/bonkedbythonk/anicat/nightly/scripts/install_macos.sh | bash"
              echo "\`\`\`"
              echo ""
              echo "**Terminal CLI Only:**"
              echo "\`\`\`bash"
              echo "curl -fsSL https://raw.githubusercontent.com/bonkedbythonk/anicat/nightly/scripts/install_cli.sh | bash"
              echo "\`\`\`"
              echo "EOF"
            } >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
          fi

      - name: Pre-clean release tag (re-run safety)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.release_params.outputs.tag }}"
          gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true
          echo "Pre-cleaned tag: $TAG"

  build:
    needs: setup
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-14' # Apple Silicon (M1) Runner
            args: '--target aarch64-apple-darwin'
            triple: 'aarch64-apple-darwin'
            sidecar_suffix: ''
            tauri_extra_env: 'TAURI_BUNDLER_DMG_IGNORE_CI: "true"'
          - platform: 'windows-latest'
            args: '--target x86_64-pc-windows-msvc'
            triple: 'x86_64-pc-windows-msvc'
            sidecar_suffix: '.exe'
            tauri_extra_env: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: web/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('web/package-lock.json') }}-${{ hashFiles('web/src/**/*.js', 'web/src/**/*.jsx', 'web/src/**/*.ts', 'web/src/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('web/package-lock.json') }}-

      - name: install python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: install uv
        if: runner.os == 'macOS'
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: install uv (Windows)
        if: runner.os == 'Windows'
        run: irm https://astral.sh/uv/install.ps1 | iex
        shell: powershell

      - name: install python dependencies
        run: uv sync --all-extras

      - name: inject commit SHA into version
        run: |
          python -c "from pathlib import Path; p=Path('anicat_media/_version.py'); p.write_text(p.read_text().replace('__commit__ = \"\"', '__commit__ = \"${{ github.sha }}\"'))"
          echo "Injected commit SHA: ${{ github.sha }}"

      - name: build sidecar
        run: |
          uv run pyinstaller --noconfirm build_sidecar/sidecar.spec
          mkdir -p web/src-tauri/binaries
          mv dist/anicat-server${{ matrix.sidecar_suffix }} web/src-tauri/binaries/anicat-server-${{ matrix.triple }}${{ matrix.sidecar_suffix }}

      - name: install rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.triple }}

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            web/src-tauri -> target

      - name: install frontend dependencies
        run: cd web && npm install

      - name: Setup Bundled Player Companion (macOS)
        if: runner.os == 'macOS'
        run: chmod +x ./scripts/setup_bundled_player.sh && ./scripts/setup_bundled_player.sh

      - name: Setup Bundled Player Companion (Windows)
        if: runner.os == 'Windows'
        run: ./scripts/setup_bundled_player_windows.ps1
        shell: powershell

      - name: build frontend
        working-directory: web
        env:
          NEXT_TELEMETRY_DISABLED: 1
        run: npm run build

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT_TELEMETRY_DISABLED: 1
          TAURI_BUNDLER_DMG_IGNORE_CI: "true"
        with:
          projectPath: web
          tagName: ${{ needs.setup.outputs.tag }}
          releaseName: ${{ needs.setup.outputs.name }}
          releaseBody: ${{ needs.setup.outputs.body }}
          releaseDraft: true
          prerelease: ${{ needs.setup.outputs.prerelease }}
          uploadWorkflowArtifacts: true
          args: ${{ matrix.args }}

  publish:
    needs: [setup, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Publish Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.setup.outputs.tag }}"
          echo "Publishing release for tag: $TAG"
          gh release edit "$TAG" --draft=false

      # Auto-push the semver tag (e.g. v4.19.0) for master builds so
      # release.yml (triggered by v* tags) also fires after the build.
      - name: Push version tag (master only)
        if: github.ref_name == 'master'
        run: |
          VERSION=$(cat version.txt)
          TAG="v${VERSION}"
          # Create lightweight tag pointing to HEAD
          git tag -f "$TAG"
          git push origin "$TAG" || echo "Tag $TAG already exists remotely"
          echo "Pushed version tag: $TAG"

      - name: Clean up older rolling releases
        if: github.ref_name == 'master'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set +e
          CURRENT_TAG="${{ needs.setup.outputs.tag }}"
          # Only clean up if the current release was actually created
          if gh release view "$CURRENT_TAG" --json tagName --jq '.tagName' 2>/dev/null; then
            VERSION=$(cat version.txt)
            NEW_VAL_TAG="v${VERSION}"
            echo "Current stable release: $CURRENT_TAG"
            echo "Current version tag: $NEW_VAL_TAG"
            echo "Removing older releases (keeping $CURRENT_TAG and $NEW_VAL_TAG)..."
            gh release list --limit 100 --json tagName --jq '.[].tagName' 2>/dev/null \
              | grep -E '^v[0-9]' || true \
              | grep -v "^${CURRENT_TAG}$" || true \
              | grep -v "^${NEW_VAL_TAG}$" || true \
              | while read -r old_tag; do
                  echo "  Deleting release and tag: $old_tag"
                  gh release delete "$old_tag" --yes --cleanup-tag || true
                done
            echo "Older stable and version releases cleaned up."

            echo "Removing older git tags from remote origin..."
            git ls-remote --tags origin | grep -o 'refs/tags/v.*' | cut -d/ -f3 | while read -r old_tag; do
              if [ "$old_tag" != "$CURRENT_TAG" ] && [ "$old_tag" != "$NEW_VAL_TAG" ]; then
                echo "  Deleting remote git tag: $old_tag"
                git push origin --delete "$old_tag" || true
              fi
            done
            echo "Older git tags cleaned up."
          else
            echo "Current release $CURRENT_TAG was not created. Skipping cleanup to preserve existing releases."
          fi
          set -e
